<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--ul listas não ordenadas-->
    <ul>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
        <li><ul>
            <li>Subitem 1</li>
            <li>Subitem 2</li>
        </ul></li>
    </ul>
    <!--ol listas ordenadas-->
    <ol>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
        <li><ol>
            <li>Subitem 1</li>
            <li>Subitem 2</li>
    </ol>

</body>
</html>
