<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas 2</title>
   
</head>
<body>
    <h1>Tabelas - exercício</h1>
    <!--caption -> Legenda / Titulo
        thead -> Cabeçalho da tabela 
        tbody -> Corpo da tabela 
        tfoot -> Rodapé da tabela 
        -->
        <table border="1">
            <caption>Listagem de Países mais populosos</caption>
            <thead>
                <tr>
                    <th>Posição</th>
                    <th>País</th>
                    <th>População aproximada (milhões)</th>
                </tr>

            </thead>

            <tbody>
                 <tr>
            <td>1</td>
            <td><img src = "/tarefa2/imagens tabela/b1.jpg">China </td>
            <td>1.400</td>
        </tr>
        <tr>
            <td>2</td>
            <td><img src = "/tarefa2/imagens tabela/b2.jpg">Índia </td>
            <td>1.380</td>
        </tr>
        <tr>
            <td>3</td>
            <td><img src = "/tarefa2/imagens tabela/b3.jpg">Estados Unidos </td>
            <td>331</td>
        </tr>
        <tr>
            <td>4</td>
            <td><img src = "/tarefa2/imagens tabela/b4.jpg">Indonésia </td>
            <td>273</td>
        </tr>
        <tr>
            <td>5</td>
            <td><img src = "/tarefa2/imagens tabela/b5.jpg">Paquistão </td>
            <td>220</td>
        </tr>
        <tr>
            <td>6</td>
            <td><img src = "/tarefa2/imagens tabela/b6.jpg">Brasil </td>
            <td>212</td>
        </tr>
            </tbody>
                <tfoot>
                    <tr>
                        <td colspan="3">Fonte: ficticio.com.br</td>

                    </tr>
        </table>
    
</body>
</html>
